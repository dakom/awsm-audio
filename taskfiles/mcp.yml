version: "3"

includes:
  config:
    taskfile: ./config.yml
    flatten: true

tasks:
  serve:
    desc: "MCP server: rmcp /mcp + the editor /editor WebSocket + /debug + /renders."
    cmds:
      - >
        cargo run -p awsm-audio-mcp --
        --port {{.PORT_MCP_HTTP_DEV}}

  build:
    desc: "Build the MCP server binary (debug)."
    cmds:
      - cargo build -p awsm-audio-mcp

  install:
    desc: "Build (release) + install the `awsm-audio-mcp` binary to ~/.cargo/bin so you can run it from anywhere."
    # Optimized release build — the same artifact CI will package + distribute.
    cmds:
      - cargo install --path {{.PATH_PACKAGES}}/mcp --bin awsm-audio-mcp --force
      - 'echo "Installed awsm-audio-mcp to ~/.cargo/bin. Run it from anywhere — bare awsm-audio-mcp uses the default port {{.PORT_MCP_HTTP_DEV}}."'
