version: "3"

vars:
  # Paths
  PATH_REPO_ROOT:
    sh: git rev-parse --show-toplevel
  PATH_BUILD_ARTIFACTS: '{{joinPath .PATH_REPO_ROOT ".build-artifacts"}}'
  PATH_PACKAGES: '{{joinPath .PATH_REPO_ROOT "packages"}}'
  PATH_CRATES: '{{joinPath .PATH_PACKAGES "crates"}}'
  PATH_FRONTENDS: '{{joinPath .PATH_PACKAGES "frontend"}}'
  PATH_CRATE_PLAYER: '{{joinPath .PATH_CRATES "player"}}'
  PATH_FRONTEND_EDITOR: '{{joinPath .PATH_FRONTENDS "editor"}}'

  # Ports — deliberately in the 91xx block so they never collide with the
  # awsm-renderer dev servers (which live in 9079–9085).
  PORT_EDITOR_DEV: 9170
  PORT_MCP_HTTP_DEV: 9171 # TCP — rmcp /mcp + /control + /debug
  PORT_MCP_QUIC_DEV: 9172 # UDP — WebTransport link the editor dials into

  # URLs — dev
  URL_DEV_EDITOR: "http://localhost:{{.PORT_EDITOR_DEV}}"

  # The default MCP server origin the editor dials out to (always local).
  URL_MCP_DEFAULT: "http://127.0.0.1:{{.PORT_MCP_HTTP_DEV}}"

  # URLs — production (GitHub Pages deploy targets)
  URL_PROD_EDITOR: "https://dakom.github.io/awsm-audio/editor/"

  # Trunk public-URL prefix. Production builds embed
  # `${PROD_ROOT_BASE_URI_PATH}/<frontend>/` so links resolve under the repo
  # subpath of the dakom.github.io site; dev builds run at the root.
  PROD_ROOT_BASE_URI_PATH: "/awsm-audio"
  DEV_ROOT_BASE_URI_PATH: ""
