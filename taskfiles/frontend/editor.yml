version: "3"

includes:
  config:
    taskfile: ../config.yml
    flatten: true

vars:
  PATH_CRATE: '{{joinPath .PATH_FRONTENDS "editor"}}'
  PATH_DIST: '{{joinPath .PATH_BUILD_ARTIFACTS "editor"}}'

tasks:
  dev:
    desc: "editor: trunk serve (WebAudio editor)"
    env:
      ROOT_BASE_URI_PATH: "{{.ROOT_BASE_URI_PATH}}"
      MCP_DEFAULT_ORIGIN: "{{.URL_MCP_DEFAULT}}"
    cmds:
      - >
        cd {{.PATH_CRATE}} &&
        trunk serve --port {{.PORT_EDITOR_DEV}}
        --watch "{{.PATH_CRATE}}"
        --watch "{{.PATH_CRATE_PLAYER}}"

  build:
    desc: "editor: production build for Cloudflare Pages (served at the project root)"
    env:
      ROOT_BASE_URI_PATH: "{{.ROOT_BASE_URI_PATH}}"
      MCP_DEFAULT_ORIGIN: "{{.URL_MCP_DEFAULT}}"
    cmds:
      - rm -rf {{joinPath .PATH_CRATE "dist"}}
      - rm -rf {{.PATH_DIST}}
      - cd {{.PATH_CRATE}} && trunk build --release --public-url "{{.URL_EDITOR}}"
      - mkdir -p {{.PATH_DIST}}
      - cp -r {{joinPath .PATH_CRATE "dist"}}/* {{.PATH_DIST}}/
      - cp {{.PATH_DIST}}/index.html {{.PATH_DIST}}/404.html

  clean:
    desc: "editor: remove dist + .build-artifacts output"
    cmds:
      - rm -rf {{joinPath .PATH_CRATE "dist"}}
      - rm -rf {{.PATH_DIST}}

  deploy:
    desc: "Build the editor and deploy it to Cloudflare Pages (project: awsm-audio)"
    deps: ["build"]
    requires:
      vars:
        [
          CLOUDFLARE_DEPLOY_WORKERS_TOKEN,
          CLOUDFLARE_PAGES_PROJECT,
          CLOUDFLARE_PAGES_BRANCH,
        ]
    env:
      CLOUDFLARE_API_TOKEN: "{{.CLOUDFLARE_DEPLOY_WORKERS_TOKEN}}"
    cmds:
      - task: _cloudflare-ensure-project
      - >
        wrangler pages deploy "{{.PATH_DIST}}"
        --project-name="{{.CLOUDFLARE_PAGES_PROJECT}}"
        --branch "{{.CLOUDFLARE_PAGES_BRANCH}}"

  _cloudflare-ensure-project:
    desc: "Ensure the Cloudflare Pages project exists"
    internal: true
    requires:
      vars:
        [
          CLOUDFLARE_DEPLOY_WORKERS_TOKEN,
          CLOUDFLARE_PAGES_PROJECT,
          CLOUDFLARE_PAGES_BRANCH,
        ]
    env:
      CLOUDFLARE_API_TOKEN: "{{.CLOUDFLARE_DEPLOY_WORKERS_TOKEN}}"
    cmds:
      - |
        set -euo pipefail
        PROJECT="{{.CLOUDFLARE_PAGES_PROJECT}}"
        if wrangler pages project list --json | jq -e --arg project "$PROJECT" '.[] | select(."Project Name" == $project)' >/dev/null; then
          echo "Cloudflare Pages project exists: $PROJECT"
        else
          wrangler pages project create "$PROJECT" --production-branch "{{.CLOUDFLARE_PAGES_BRANCH}}"
        fi
