[package]
name = "awsm-audio-schema"
description = "Authored WebAudio sample/graph schema consumed by the awsm-audio editor + player."
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true

[dependencies]
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
uuid = { workspace = true }
# Optional: derive JSON Schema for the schema types so the native MCP server can
# expose strongly-typed tool params. Off by default (wasm never pulls it).
schemars = { workspace = true, optional = true }
# Standard MIDI File parsing for the Note Sequencer (and Control Sequencer CC import).
midly = { workspace = true }

[features]
# Derive `schemars::JsonSchema` on the schema types (id newtypes get a hand-rolled
# `"type":"string","format":"uuid"` schema instead of recursing into Uuid).
schemars = ["dep:schemars"]

[dev-dependencies]
# Format-agnostic schema: TOML is only used to exercise round-tripping in tests.
# Consumers (editor/player) choose the format at the call site.
toml = { workspace = true }
