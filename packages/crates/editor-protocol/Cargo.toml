[package]
name = "awsm-audio-editor-protocol"
description = "Shared serializable command/query/transport vocabulary for driving the awsm-audio editor over MCP/WebSocket."
# Internal: shared only between the editor frontend and the MCP server. Not a
# crate creators depend on, so it's kept off crates.io.
publish = false
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true

[dependencies]
awsm-audio-schema = { workspace = true }
serde = { workspace = true }
uuid = { workspace = true } # ConnId = Uuid
# Optional: derive JSON Schema for the command/query vocabulary so the native MCP
# server can expose strongly-typed, self-documenting tool params.
schemars = { workspace = true, optional = true }

[features]
schemars = ["dep:schemars", "awsm-audio-schema/schemars"]

[dev-dependencies]
serde_json = { workspace = true }
toml = { workspace = true }
