[package]
name = "awsm-audio-editor"
publish = false  # frontend app, not released to crates.io
description = "WebAudio authoring tool for awsm-audio."
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true

# This is a wasm-only frontend (built with Trunk), not a host binary — exclude it
# from cargo-dist's prebuilt-binary packaging.
[package.metadata.dist]
dist = false

[dependencies]
awsm-audio-player = { workspace = true }
awsm-audio-schema = { workspace = true }
awsm-audio-editor-protocol = { workspace = true }

anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-wasm = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
js-sys = { workspace = true }
console_error_panic_hook = { workspace = true }
base64 = { workspace = true }

dominator = { workspace = true }
futures-signals = { workspace = true }
futures = { workspace = true }

serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
toml = { workspace = true }
uuid = { version = "1.11.0", features = ["v4", "serde", "js"] }

# MCP remote-control link: the editor dials out to the native MCP server over a
# WebSocket (`gloo-net` websocket); `http` for the render-upload POST.
gloo-net = { version = "0.6", features = ["http", "websocket"] }
gloo-timers = { version = "0.3", features = ["futures"] }

# Additive on top of the workspace web-sys baseline: pointer/wheel/keyboard
# events and DomRect for the pan/zoom canvas coordinate math.
[dependencies.web-sys]
workspace = true
features = [
    "MouseEvent",
    "PointerEvent",
    "WheelEvent",
    "KeyboardEvent",
    "DomRect",
    "HtmlInputElement",
    "HtmlSelectElement",
    "HtmlCanvasElement",
    "CanvasRenderingContext2d",
    "File",
    "FileList",
    "Blob",
    "Url",
    # Copy-to-clipboard buttons (e.g. install commands in the Help modal).
    "Clipboard",
    # Per-tab persistence of the MCP "live work display" toggles: localStorage
    # keyed by a sessionStorage-minted tab id (see `mcp_activity`).
    "Storage",
    # File System Access API — directory-based projects (Chromium-only; gated
    # behind the workspace's `web_sys_unstable_apis` cfg).
    "DirectoryPickerOptions",
    "FileSystemHandle",
    "FileSystemHandleKind",
    "FileSystemPermissionMode",
    "FileSystemHandlePermissionDescriptor",
    "FileSystemDirectoryHandle",
    "FileSystemFileHandle",
    "FileSystemWritableFileStream",
    "FileSystemGetDirectoryOptions",
    "FileSystemGetFileOptions",
    "FileSystemCreateWritableOptions",
]
