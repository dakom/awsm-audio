[package]
name = "awsm-audio-mcp"
description = "Native MCP server for the awsm-audio editor (WebTransport link + rmcp). Installs as the `awsm-audio-mcp` command."
# MSRV split: rmcp 1.x requires edition-2024 / Rust >= 1.85. The wasm crates stay
# on the workspace defaults (edition 2021 / 1.80); only this native crate bumps.
edition = "2024"
rust-version = "1.85"
version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish = false

[[bin]]
name = "awsm-audio-mcp"
path = "src/main.rs"

[dependencies]
# `schemars` feature: derive JSON Schema on the protocol + schema types so tool
# params can be strongly typed (and self-documenting) rather than raw JSON.
awsm-audio-editor-protocol = { workspace = true, features = ["schemars"] }
awsm-audio-schema = { workspace = true, features = ["schemars"] }

tokio = { version = "1.47", features = ["full"] }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { workspace = true }
serde_json = { workspace = true }

# WebTransport (QUIC) — quinn on native, self-signed dev cert.
web-transport = "0.10.5"
rustls = "0.23"
rcgen = "0.14"
sha2 = "0.10"
base64 = { workspace = true }
time = { version = "0.3", features = ["formatting"] }

# HTTP control surface.
axum = "0.8"
tower-http = { version = "0.6", features = ["cors"] }

# The rmcp /mcp endpoint.
rmcp = { version = "1", features = [
    "server",
    "macros",
    "schemars",
    "transport-streamable-http-server",
] }
uuid = { workspace = true }
