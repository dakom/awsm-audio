[package]
name = "awsm-audio-mcp"
description = "Native MCP server for the awsm-audio editor (WebSocket link + rmcp). Installs as the `awsm-audio-mcp` command."
# MSRV split: rmcp 1.x requires edition-2024 / Rust >= 1.85. The wasm crates stay
# on the workspace defaults (edition 2021 / 1.80); only this native crate bumps.
edition = "2024"
rust-version = "1.85"
version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage = "https://github.com/dakom/awsm-audio"
publish = false

# Not a crates.io library (`publish = false`), but cargo-dist *does* ship its
# binary as a prebuilt GitHub Release — opt back in explicitly.
[package.metadata.dist]
dist = true

[[bin]]
name = "awsm-audio-mcp"
path = "src/main.rs"

[dependencies]
# `schemars` feature: derive JSON Schema on the protocol + schema types so tool
# params can be strongly typed (and self-documenting) rather than raw JSON.
awsm-audio-editor-protocol = { workspace = true, features = ["schemars"] }
awsm-audio-schema = { workspace = true, features = ["schemars"] }

tokio = { version = "1.47", features = ["full"] }
clap = { version = "4", features = ["derive"] }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { workspace = true }
serde_json = { workspace = true }
futures = { workspace = true }

# Decode the base64 `.wasm` an agent attaches via `attach_wasm`.
base64 = { workspace = true }

# HTTP control surface + the editor WebSocket link.
axum = { version = "0.8", features = ["ws"] }
tower-http = { version = "0.6", features = ["cors"] }

# The rmcp /mcp endpoint.
rmcp = { version = "1", features = [
    "server",
    "macros",
    "schemars",
    "transport-streamable-http-server",
] }
uuid = { workspace = true }
