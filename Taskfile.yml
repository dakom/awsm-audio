version: "3"

silent: true

dotenv: [".env"]

includes:
  config:
    taskfile: ./taskfiles/config.yml
    flatten: true
  editor:
    taskfile: ./taskfiles/frontend/editor.yml
  mcp:
    taskfile: ./taskfiles/mcp.yml
  publish:
    taskfile: ./taskfiles/publish.yml

tasks:
  default:
    desc: "List all tasks"
    cmds:
      - task --list-all

  dev:
    desc: "Build the example worklets, then run the editor dev server"
    cmds:
      - task: worklets
      - task: editor:dev

  mcp-dev:
    desc: "Editor + MCP server. Open http://localhost:9170/?mcp=http://127.0.0.1:9171 to attach."
    deps:
      - editor:dev
      - mcp:serve

  build:
    desc: "Build every frontend for production into .build-artifacts/"
    cmds:
      - task: worklets
      - task: editor:build

  clean:
    desc: "Remove every frontend's dist + .build-artifacts output"
    cmds:
      - task: editor:clean

  deploy:
    desc: "Build the editor and deploy it to Cloudflare Pages (project: awsm-audio)"
    deps: ["editor:build"]
    requires:
      vars:
        [
          CLOUDFLARE_DEPLOY_WORKERS_TOKEN,
          CLOUDFLARE_PAGES_PROJECT,
          CLOUDFLARE_PAGES_BRANCH,
        ]
    env:
      CLOUDFLARE_API_TOKEN: "{{.CLOUDFLARE_DEPLOY_WORKERS_TOKEN}}"
    cmds:
      - task: _cloudflare-ensure-project
      - >
        wrangler pages deploy "{{joinPath .PATH_BUILD_ARTIFACTS "editor"}}"
        --project-name="{{.CLOUDFLARE_PAGES_PROJECT}}"
        --branch "{{.CLOUDFLARE_PAGES_BRANCH}}"

  _cloudflare-ensure-project:
    desc: "Ensure the Cloudflare Pages project exists"
    internal: true
    requires:
      vars:
        [
          CLOUDFLARE_DEPLOY_WORKERS_TOKEN,
          CLOUDFLARE_PAGES_PROJECT,
          CLOUDFLARE_PAGES_BRANCH,
        ]
    env:
      CLOUDFLARE_API_TOKEN: "{{.CLOUDFLARE_DEPLOY_WORKERS_TOKEN}}"
    cmds:
      - |
        set -euo pipefail
        PROJECT="{{.CLOUDFLARE_PAGES_PROJECT}}"
        if wrangler pages project list --json | jq -e --arg project "$PROJECT" '.[] | select(."Project Name" == $project)' >/dev/null; then
          echo "Cloudflare Pages project exists: $PROJECT"
        else
          wrangler pages project create "$PROJECT" --production-branch "{{.CLOUDFLARE_PAGES_BRANCH}}"
        fi

  lint:
    desc: "Run rustfmt + clippy with -D warnings (mirrors CI: wasm32 + host)."
    cmds:
      - cargo fmt --all -- --check
      # awsm-audio-mcp is a native-only server (tokio net / quinn); skip it on wasm32.
      - cargo clippy --workspace --exclude awsm-audio-mcp --target wasm32-unknown-unknown -- -D warnings
      - cargo clippy --workspace -- -D warnings

  worklets:
    desc: "Build the example WASM worklets and embed them into the schema assets."
    vars:
      OUT: target/wasm32-unknown-unknown/release
    cmds:
      - cargo build --release --target wasm32-unknown-unknown -p awsm-audio-worklet-bitcrusher -p awsm-audio-worklet-drive -p awsm-audio-worklet-ringmod
      - cp {{.OUT}}/awsm_audio_worklet_bitcrusher.wasm packages/crates/schema/assets/bitcrusher.wasm
      - cp {{.OUT}}/awsm_audio_worklet_drive.wasm packages/crates/schema/assets/drive.wasm
      - cp {{.OUT}}/awsm_audio_worklet_ringmod.wasm packages/crates/schema/assets/ringmod.wasm
      - 'echo "Worklets embedded. Regenerate examples: WRITE_EXAMPLES=1 cargo test -p awsm-audio-schema write_example_files"'
