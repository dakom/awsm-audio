version: "3"

silent: true

dotenv: [".env"]

includes:
  config:
    taskfile: ./taskfiles/config.yml
    flatten: true
  editor:
    taskfile: ./taskfiles/frontend/editor.yml
  example:
    taskfile: ./taskfiles/frontend/example.yml
  mcp:
    taskfile: ./taskfiles/mcp.yml
  crates:
    taskfile: ./taskfiles/crates/publish.yml

tasks:
  default:
    desc: "List all tasks"
    cmds:
      - task --list-all

  dev:
    desc: "Build the example worklets, then run the editor dev server"
    cmds:
      - task: worklets
      - task: editor:dev

  mcp-dev:
    desc: "Editor + MCP server. Open http://localhost:9170/?mcp=127.0.0.1:9171 to attach."
    deps:
      - editor:dev
      - mcp:serve

  example-dev:
    desc: "Run the standalone player example locally (http://localhost:9172) — not deployed."
    cmds:
      - task: worklets
      - task: example:dev

  build:
    desc: "Build every frontend for production into .build-artifacts/"
    cmds:
      - task: worklets
      - task: editor:build

  clean:
    desc: "Remove every frontend's dist + .build-artifacts output"
    cmds:
      - task: editor:clean
      - task: example:clean

  bump:
    desc: "Set [workspace.package].version to <version>, sync the worklet-ABI doc's dep major in mcp.rs, and refresh Cargo.lock — files only, NO git/tag/publish. Idempotent: re-running at the same version makes no diff, so it's safe to call repeatedly (and from `task publish`). Usage: task bump -- <version>"
    vars:
      VERSION: "{{.CLI_ARGS}}"
    preconditions:
      - sh: 'test -n "{{.VERSION}}"'
        msg: "No version given. Usage: task bump -- <version>   (e.g. task bump -- 1.2.0)"
    cmds:
      # 1. The package version (members inherit it via `version.workspace = true`).
      #    Scoped to [workspace.package] so it never touches a dependency's version.
      - sed -i.bak -E '/^\[workspace\.package\]/,/^\[/ s/^version = "[^"]*"/version = "{{.VERSION}}"/' Cargo.toml
      # 2. The internal awsm-audio-* dependency version reqs, kept in lockstep — so
      #    published crates require each other at the matching version, not a stale
      #    `^0.1.0` (which only happens to cover patch bumps within 0.1.x).
      - sed -i.bak -E '/^awsm-audio-[a-z-]+ = \{ path =/ s/version = "[^"]*"/version = "{{.VERSION}}"/' Cargo.toml
      - rm -f Cargo.toml.bak
      # 3. The worklet-ABI doc (mcp.rs WORKLET_ABI_DOC) embeds a copy-paste
      #    `awsm-audio-worklet = "<major>"` snippet for agents. Unlike the tool
      #    output (derived from CARGO_PKG_VERSION at runtime), this one is a const
      #    string literal, so a major bump would leave it stale. Sync just the major.
      #    Anchored to a bare-integer literal so the sibling `"{req}"` template — the
      #    derived snippet — is never touched.
      - |
        MAJOR=$(printf '%s' "{{.VERSION}}" | cut -d. -f1)
        sed -i.bak -E "s/^awsm-audio-worklet = \"[0-9]+\"\$/awsm-audio-worklet = \"$MAJOR\"/" packages/mcp/src/mcp.rs
        rm -f packages/mcp/src/mcp.rs.bak
        # Guard: fail loudly if the sed didn't land (doc line reworded/indented/renamed).
        # Without this the major could silently drift out of lockstep with the bump.
        if ! grep -qxF "awsm-audio-worklet = \"$MAJOR\"" packages/mcp/src/mcp.rs; then
          echo "ERROR: could not sync the worklet-ABI doc dep major to \"$MAJOR\" in packages/mcp/src/mcp.rs." >&2
          echo "       The 'awsm-audio-worklet = \"<major>\"' literal in WORKLET_ABI_DOC may have moved or changed shape." >&2
          exit 1
        fi
      # Refresh Cargo.lock so the workspace members' recorded versions match (and
      # sanity-build the tree). A no-op when already at this version.
      - cargo check --workspace --quiet

  publish:
    desc: "Release <version> end-to-end: bump → commit (only if needed) → tag → publish crates → deploy editor → push. Works whether the version was already bumped (e.g. in a merged PR) or not. Usage: task publish -- <version>"
    vars:
      VERSION: "{{.CLI_ARGS}}"
    preconditions:
      - sh: 'test -n "{{.VERSION}}"'
        msg: "No version given. Usage: task publish -- <version>   (e.g. task publish -- 1.2.0)"
      - sh: "git diff --quiet && git diff --cached --quiet"
        msg: "Working tree is dirty — commit or stash before releasing."
    cmds:
      - echo "▶ Releasing v{{.VERSION}} …"
      # 1. Ensure the version is set (idempotent — no-op if a PR already bumped it).
      - task: bump
        vars:
          VERSION: "{{.VERSION}}"
      # 2. Commit the bump ONLY if it changed anything. A tree already at this
      #    version (bumped in a merged PR) produces no diff → no release commit,
      #    so the repo is left untouched.
      - |
        if git diff --quiet -- Cargo.toml Cargo.lock; then
          echo "  Already at v{{.VERSION}} (bumped earlier) — no release commit needed."
        else
          git add Cargo.toml Cargo.lock
          git commit -m "Release v{{.VERSION}}"
        fi
      # 3. Tag the release (annotated). Pushing this tag triggers the cargo-dist
      #    MCP-server release on CI.
      - git tag -a "v{{.VERSION}}" -m "v{{.VERSION}}"
      # 4. Publish the library crates (schema → player → worklet) to crates.io.
      - task: crates:publish
      # 5. Deploy the editor frontend to Cloudflare Pages.
      - task: editor:deploy
      # 6. Push the branch (no-op if already up to date) + the new tag.
      - git push
      - git push origin "v{{.VERSION}}"
      - echo "✅ v{{.VERSION}} — crates published, editor deployed, tag pushed (MCP release building on CI)."

  lint:
    desc: "Run rustfmt + clippy with -D warnings (mirrors CI: wasm32 + host)."
    cmds:
      - cargo fmt --all -- --check
      # awsm-audio-mcp is a native-only server (tokio net / quinn); skip it on wasm32.
      - cargo clippy --workspace --exclude awsm-audio-mcp --target wasm32-unknown-unknown -- -D warnings
      - cargo clippy --workspace -- -D warnings

  worklets:
    desc: "Build the example WASM worklets."
    vars:
      OUT: target/wasm32-unknown-unknown/release
    cmds:
      - cargo build --release --target wasm32-unknown-unknown -p awsm-audio-worklet-bitcrusher -p awsm-audio-worklet-drive -p awsm-audio-worklet-ringmod
      - 'echo "Worklets built in {{.OUT}}. Copy them into an editor-served example directory if a demo needs them."'
