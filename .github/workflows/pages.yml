name: pages

on:
  push:
    branches:
      - main

# Only one Pages build at a time; cancel an in-flight one when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # jetli/trunk-action still ships as a Node-20 action (no newer release). Opt it
  # (and any other JS action) into the Node-24 runtime now — Node 24 becomes the
  # default on 2026-06-16 anyway — so the deprecation warning is cleared.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-pages:
    name: Build the editor + package the Pages site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "awsm-audio"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.1
        with:
          version: "latest"

      - name: Install Task
        uses: go-task/setup-task@v2

      # `task build` builds the example worklets, then trunk-builds the editor into
      # .build-artifacts/editor with `--public-url https://dakom.github.io/awsm-audio/editor/`
      # (from taskfiles/config.yml) so its assets resolve under the Pages subpath.
      # The wasm build picks up `--cfg=web_sys_unstable_apis` from .cargo/config.toml.
      - name: Build the editor (production)
        run: task build

      # The deployed tree:
      #   pages/editor/...   the editor's trunk dist (served at /awsm-audio/editor/)
      #   pages/index.html   a redirect to editor/ (so /awsm-audio/ lands on the app)
      #   pages/404.html     same redirect for unknown root paths
      - name: Assemble the Pages tree
        run: |
          set -euo pipefail
          rm -rf .build-artifacts/pages
          mkdir -p .build-artifacts/pages
          cp -r .build-artifacts/editor .build-artifacts/pages/editor
          cat > .build-artifacts/pages/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <title>AwsmAudio</title>
              <meta http-equiv="refresh" content="0; url=editor/" />
              <link rel="canonical" href="editor/" />
            </head>
            <body>
              <a href="editor/">AwsmAudio editor →</a>
            </body>
          </html>
          HTML
          cp .build-artifacts/pages/index.html .build-artifacts/pages/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages
          path: ./.build-artifacts/pages

  deploy:
    name: Deploy to GitHub Pages
    needs: build-pages
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
